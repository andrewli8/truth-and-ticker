<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0a0b"/>
  <!-- faint grid -->
  <g stroke="#2a2a2e" stroke-width="1" opacity="0.5">
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="470" x2="1200" y2="470"/>
  </g>
  <!-- stylized SPX line -->
  <path d="M0 360 L150 470 L300 300 L450 420 L600 470 L780 380 L920 520 L1060 200 L1200 120"
        fill="none" stroke="#ff4d3d" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="1060" cy="200" r="12" fill="#ff4d3d"/>
  <!-- kicker -->
  <text x="80" y="150" font-family="monospace" font-size="26" letter-spacing="8" fill="#ff4d3d">JAN–JUN 2025 · TRUMP'S SECOND TERM</text>
  <!-- title -->
  <text x="76" y="320" font-family="'Arial Black', Arial, sans-serif" font-weight="800" font-size="128" letter-spacing="-3" fill="#ece8e1">TRUTH<tspan fill="#ff4d3d">&amp;</tspan>TICKER</text>
  <!-- subtitle -->
  <text x="80" y="430" font-family="Arial, sans-serif" font-weight="700" font-size="40" fill="#ece8e1">When Trump posts, the market moves.</text>
  <text x="80" y="560" font-family="monospace" font-size="26" letter-spacing="3" fill="#8a8a93">S&amp;P 500 · NASDAQ · OIL · DEFENSE · GOLD · DOLLAR</text>
</svg>
